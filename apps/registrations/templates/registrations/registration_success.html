{% extends "base.html" %}

{% block title %}Sucesso!{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 text-center py-5">
        <div class="card p-5 shadow-lg border-0" style="border-radius: 20px; background: linear-gradient(to bottom right, #ffffff, #f8f9fa);">
            
            <!-- Ícone Elegante (Foguete) -->
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle shadow-sm" style="width: 110px; height: 110px;">
                    <i class="bi bi-rocket-takeoff-fill" style="font-size: 4.5rem;"></i>
                </div>
            </div>
            
            <!-- Título Vibrante -->
            <h2 class="fw-bold text-dark mb-4" style="letter-spacing: -0.5px;">Tudo Certo!</h2>
            
            <!-- Mensagem Dinâmica do Motor de Regras -->
            <p class="text-secondary fs-5 mb-5" style="line-height: 1.6;">
                {{ success_message }}
            </p>
            
            <!-- Sênior Fix: Fallback elegante para fechamento de aba -->
            <div class="mt-4" id="action-container">
                <button onclick="fecharAba()" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                    <i class="bi bi-check2-circle me-2"></i>Concluir
                </button>
            </div>
            
            <div id="safe-close-message" style="display: none;" class="mt-4 p-3 bg-success bg-opacity-10 text-success rounded border border-success border-opacity-25 shadow-sm">
                <i class="bi bi-info-circle-fill me-2"></i><strong>Operação finalizada!</strong><br>
                <span class="small">Você já pode fechar esta aba do navegador com segurança.</span>
            </div>
            
        </div>
    </div>
</div>

<script>
    // Função acionada pelo botão Concluir
    function fecharAba() {
        // Tenta fechar a aba nativamente
        try { window.close(); } catch(e) {}
        
        // Fallback UX: Se o navegador bloquear, oculta o botão e exibe a mensagem de liberação
        document.getElementById('action-container').style.display = 'none';
        document.getElementById('safe-close-message').style.display = 'block';
    }
</script>
{% endblock %}
