{% extends "base.html" %}

{% block title %}Acesso Revogado{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="max-width: 500px; width: 100%; border-radius: 15px;">
        <div class="card-body p-5 text-center">
            
            <!-- Ícone de Bloqueio -->
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill text-danger" style="font-size: 4rem;"></i>
            </div>
            
            <h2 class="fw-bold mb-3 text-danger">Acesso Revogado</h2>
            <p class="text-muted fs-5">
                O acesso a essa página foi revogado pelo administrador.
            </p>
            
            <div class="alert alert-light border mt-4 shadow-sm">
                <p class="mb-0 small text-muted italic">
                    <i class="bi bi-info-circle me-1"></i>Para maiores informações, entre em contato com o Responsável pelo Evento.
                </p>
            </div>
            
        </div>
    </div>
</div>

<style>
    body { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); }
</style>
{% endblock %}
