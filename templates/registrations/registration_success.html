{% extends "base.html" %}

{% block title %}Aviso do Sistema{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="card p-5 shadow-sm border-0" style="border-radius: 15px;">
            <div class="mb-4">
                <i class="bi bi-envelope-paper-fill text-primary" style="font-size: 4rem;"></i>
            </div>
            <h3 class="fw-bold text-dark mb-4">Aviso do Sistema</h3>
            <p class="text-muted fs-5" style="line-height: 1.6;">
                {{ success_message }}
            </p>
            <div class="mt-4">
                <a href="javascript:window.close();" class="btn btn-outline-primary px-4 rounded-pill">Fechar Janela</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
